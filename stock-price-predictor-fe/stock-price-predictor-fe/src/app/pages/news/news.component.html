<div class="news-page fade-in">
  <div class="news-hero">
    <a routerLink="/" class="back-link">← Back to Dashboard</a>
    <h1>Market Intelligence News Room</h1>
    <p>One-click latest news links for market, sectors and popular Indian stocks.</p>
  </div>

  <div class="news-grid">
    <a class="news-card" *ngFor="let item of news" [href]="item.url" target="_blank" rel="noopener noreferrer">
      <span>{{ item.tag }}</span>
      <h2>{{ item.title }}</h2>
      <p>{{ item.description }}</p>
      <b>Open Latest News →</b>
    </a>
  </div>
</div>
